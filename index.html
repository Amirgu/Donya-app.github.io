<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my Valentine?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-block" id="mobileBlock">
        <div class="mobile-block-content">
            <span class="mobile-block-icon">🖥️</span>
            <h1>Je t'ai dit de voir sur le PC</h1>
            <span class="mobile-block-icon">💗</span>
        </div>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1864/1864514.png" alt="Cute Cat" class="cat-img">

        <h1 class="question">donya will you be my valentine?</h1>

        <div class="button-container">
            <button id="yesBtn">OUI</button>
            <button id="noBtn">NON</button>
        </div>

        <p class="subtext" id="subtext">*No* seems a bit shy 😈</p>

        <div id="yayContainer" style="display: none;">
            <img src="https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif" alt="Celebration" class="gif-img">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
