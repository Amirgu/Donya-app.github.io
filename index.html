<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanna go on a date Donya?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="Spring 1 - Recomposed Vivaldis Four Seasons (2012).mp3" type="audio/mpeg">
    </audio>

    <div class="splash" id="splash">
        <div class="splash-content">
            <span class="splash-icon">🔊</span>
            <h1>Active le volume</h1>
            <button id="startBtn" class="splash-btn">C'est fait</button>
        </div>
    </div>

    <div class="mobile-block" id="mobileBlock">
        <div class="mobile-block-content">
            <h1>Mini Flappy Love 💗</h1>
            <p class="mobile-game-subtitle">Tape l'écran pour faire voler le cœur.</p>
            <canvas id="flappyCanvas" width="320" height="520" aria-label="Mini jeu flappy bird rose"></canvas>
            <p class="mobile-game-score" id="mobileScore">Score : 0</p>
            <button id="restartFlappyBtn" class="splash-btn mobile-restart">Rejouer</button>
        </div>
    </div>

    <div class="card" style="display: none;">
        <img src="https://cdn-icons-png.flaticon.com/512/1864/1864514.png" alt="Cute Cat" class="cat-img">

        <h1 class="question">wanna go on a date donya ?</h1>

        <div class="button-container">
            <button id="yesBtn">OUI</button>
            <button id="noBtn">NON</button>
        </div>

        <p class="subtext" id="subtext" style="display: none;">*No* seems a bit shy 😈</p>

        <div id="yayContainer" style="display: none;">
            <img src="https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif" alt="Celebration" class="gif-img">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
